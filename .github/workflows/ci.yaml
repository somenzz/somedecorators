name: Publish to PyPI and GitHub Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for creating GitHub Releases
      id-token: write  # Required for Trusted Publishing to PyPI

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Update pyproject.toml version to match tag
        run: |
          # Extract the version without the 'v' prefix
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Setting build version to $VERSION"
          
          # Replace the version string in pyproject.toml
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package (sdist and wheel)
        run: python -m build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
